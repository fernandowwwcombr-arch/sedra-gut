<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDRA GUT — Novo Usuário</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <span class="logo-icon">⊕</span>
                <div>
                    <h1 class="logo-title">SEDRA GUT</h1>
                    <p class="logo-sub">Cadastro de Usuário</p>
                </div>
            </div>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for c, m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('cadastro') }}">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="nome" placeholder="Nome completo" required autofocus>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" placeholder="email@dominio.com" required>
            </div>
            <div class="form-group">
                <label>Perfil de Acesso</label>
                <select name="perfil">
                    <option value="operador">Operador</option>
                    <option value="visitante">Visitante</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>
            <div class="form-group">
                <label>Senha <span class="hint">(mín. 6 caracteres)</span></label>
                <input type="password" name="senha" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirmar Senha</label>
                <input type="password" name="confirma_senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Criar Usuário</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('config_usuarios') }}">← Voltar para usuários</a>
        </div>
    </div>
    <p class="version-badge">V1.0626</p>
</div>
</body>
</html>
